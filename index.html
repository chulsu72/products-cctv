<script>
    window.addEventListener("message", function(e) {
        if (e.data.type === "resize") {

            if (e.data.source === "architecture") {
                const iframe = document.querySelector(".architecture-frame iframe");
                iframe.style.height = e.data.height + "px";
            }

            if (e.data.source === "products") {
                const iframe = document.querySelector(".products-frame iframe");
                iframe.style.height = e.data.height + "px";
            }

            if (e.data.source === "products-nvr") {
                const iframe = document.querySelector(".products-nvr-frame iframe");
                iframe.style.height = e.data.height + "px";
            }

            if (e.data.source === "products-recorder") {
                const iframe = document.querySelector(".products-recorder-frame iframe");
                iframe.style.height = e.data.height + "px";
            }

            if (e.data.source === "products-vms") {
                const iframe = document.querySelector(".products-vms-frame iframe");
                iframe.style.height = e.data.height + "px";
            }

        }
    });
</script>
